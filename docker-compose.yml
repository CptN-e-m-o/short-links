services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: short_links_app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
    networks:
      - short_links

  nginx:
    image: nginx:1.27-alpine
    container_name: short_links_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - short_links

  mysql:
    image: mysql:8.0
    container_name: short_links_mysql
    ports:
      - "33061:3306"
    environment:
      MYSQL_DATABASE: short_links
      MYSQL_USER: short_links
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - short_links

  node:
    image: node:22-alpine
    container_name: short_links_node
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "tail -f /dev/null"
    networks:
      - short_links

volumes:
  mysql_data:

networks:
  short_links:
    driver: bridge